openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Wallet authentication
  - name: projects
    description: Public infrastructure projects
  - name: milestones
    description: Milestone escrow workflows
  - name: analytics
    description: Accountability analytics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /auth/nonce:
    post:
      operationId: createAuthNonce
      tags: [auth]
      summary: Create a wallet signature nonce
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthNonceRequest"
      responses:
        "200":
          description: Nonce generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthNonceResponse"
  /auth/verify:
    post:
      operationId: verifyWalletSignature
      tags: [auth]
      summary: Verify wallet signature and issue JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthVerifyRequest"
      responses:
        "200":
          description: Token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthVerifyResponse"
  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      responses:
        "200":
          description: Project list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a demo project and mirror intended on-chain data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
  /projects/stats:
    get:
      operationId: getProjectStats
      tags: [projects]
      summary: Platform spending statistics
      responses:
        "200":
          description: Project stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectStats"
  /projects/sync:
    post:
      operationId: syncProjects
      tags: [projects]
      summary: Force blockchain sync
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResponse"
  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get one project with milestones
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Project detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDetail"
  /milestones/pending:
    get:
      operationId: listPendingMilestones
      tags: [milestones]
      summary: List milestones with submitted proof awaiting auditor review
      responses:
        "200":
          description: Pending milestone list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PendingMilestone"
  /milestones/{projectId}:
    get:
      operationId: listMilestones
      tags: [milestones]
      summary: List milestones for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Milestone list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Milestone"
  /milestones:
    post:
      operationId: createMilestone
      tags: [milestones]
      summary: Create a milestone for a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMilestoneRequest"
      responses:
        "201":
          description: Milestone created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Milestone"
  /milestones/{id}/upload-proof:
    post:
      operationId: uploadMilestoneProof
      tags: [milestones]
      summary: Submit geo-tagged proof metadata and IPFS CID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitProofRequest"
      responses:
        "200":
          description: Proof submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Milestone"
  /milestones/{id}/approve:
    post:
      operationId: approveMilestone
      tags: [milestones]
      summary: Auditor approval toward 2-of-3 payment release
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveMilestoneRequest"
      responses:
        "200":
          description: Milestone approval result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Milestone"
  /milestones/{id}/reject:
    post:
      operationId: rejectMilestone
      tags: [milestones]
      summary: Auditor rejects a submitted milestone proof
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectMilestoneRequest"
      responses:
        "200":
          description: Milestone rejection result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Milestone"
  /projects/{id}/report:
    post:
      operationId: reportProjectConcern
      tags: [projects]
      summary: Citizen files an on-chain concern that pauses payment release
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportConcernRequest"
      responses:
        "200":
          description: Report accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectReport"
  /projects/{id}/reports:
    get:
      operationId: listProjectReports
      tags: [projects]
      summary: List filed citizen concerns for a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Project reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectReport"
  /milestones/{id}/proof:
    get:
      operationId: getMilestoneProof
      tags: [milestones]
      summary: Fetch stored proof metadata
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Proof metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProofMetadata"
  /analytics/overview:
    get:
      operationId: getAnalyticsOverview
      tags: [analytics]
      summary: Landing page overview metrics and recent activity
      responses:
        "200":
          description: Analytics overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsOverview"
  /analytics/anomalies:
    get:
      operationId: listAnomalies
      tags: [analytics]
      summary: List flagged projects
      responses:
        "200":
          description: Anomaly list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnomalyFlag"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]
    AuthNonceRequest:
      type: object
      properties:
        walletAddress:
          type: string
      required: [walletAddress]
    AuthNonceResponse:
      type: object
      properties:
        nonce:
          type: string
      required: [nonce]
    AuthVerifyRequest:
      type: object
      properties:
        walletAddress:
          type: string
        signature:
          type: string
      required: [walletAddress, signature]
    User:
      type: object
      properties:
        walletAddress:
          type: string
        role:
          type: string
          enum: [ADMIN, GOVT_OFFICIAL, CONTRACTOR, AUDITOR, INSPECTOR, CITIZEN]
      required: [walletAddress, role]
    AuthVerifyResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required: [token, user]
    Project:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        location:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        totalBudget:
          type: number
        spentAmount:
          type: number
        startDate:
          type: string
        endDate:
          type: string
        officialAddress:
          type: string
        contractorAddress:
          type: string
        status:
          type: string
          enum: [CREATED, ACTIVE, COMPLETED, PAUSED, CANCELLED]
        milestoneCount:
          type: integer
        txHash:
          type: string
        riskLevel:
          type: string
          enum: [LOW, MEDIUM, HIGH, CRITICAL]
        category:
          $ref: "#/components/schemas/ProjectCategory"
        reportCount:
          type: integer
      required: [id, title, description, location, latitude, longitude, totalBudget, spentAmount, startDate, endDate, officialAddress, contractorAddress, status, milestoneCount, txHash, riskLevel, category, reportCount]
    ProjectCategory:
      type: string
      enum: [ROAD, DRAINAGE, WATER_SUPPLY, STREET_LIGHTING, PARK, BUILDING, OTHER]
    CreateProjectRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        location:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        totalBudget:
          type: number
        endDate:
          type: string
        contractorAddress:
          type: string
        category:
          $ref: "#/components/schemas/ProjectCategory"
      required: [title, description, location, latitude, longitude, totalBudget, endDate, contractorAddress, category]
    ProjectDetail:
      type: object
      properties:
        project:
          $ref: "#/components/schemas/Project"
        milestones:
          type: array
          items:
            $ref: "#/components/schemas/Milestone"
        anomalies:
          type: array
          items:
            $ref: "#/components/schemas/AnomalyFlag"
      required: [project, milestones, anomalies]
    Milestone:
      type: object
      properties:
        id:
          type: string
        projectId:
          type: string
        title:
          type: string
        description:
          type: string
        paymentAmount:
          type: number
        ipfsProofCID:
          type: string
        proofLatitude:
          type: number
        proofLongitude:
          type: number
        submittedAt:
          type: string
        approvedAt:
          type: string
        submittedBy:
          type: string
        status:
          type: string
          enum: [PENDING, PROOF_SUBMITTED, APPROVED, REJECTED, PAID]
        approvalCount:
          type: integer
        txHash:
          type: string
      required: [id, projectId, title, description, paymentAmount, status, approvalCount, txHash]
    CreateMilestoneRequest:
      type: object
      properties:
        projectId:
          type: string
        title:
          type: string
        description:
          type: string
        paymentAmount:
          type: number
      required: [projectId, title, description, paymentAmount]
    SubmitProofRequest:
      type: object
      properties:
        ipfsCID:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        submittedBy:
          type: string
        proofDescription:
          type: string
      required: [latitude, longitude, submittedBy]
    ApproveMilestoneRequest:
      type: object
      properties:
        auditorAddress:
          type: string
      required: [auditorAddress]
    RejectMilestoneRequest:
      type: object
      properties:
        auditorAddress:
          type: string
        reason:
          type: string
      required: [auditorAddress, reason]
    PendingMilestone:
      type: object
      properties:
        id:
          type: string
        projectId:
          type: string
        projectTitle:
          type: string
        title:
          type: string
        description:
          type: string
        paymentAmount:
          type: number
        ipfsProofCID:
          type: string
        proofLatitude:
          type: number
        proofLongitude:
          type: number
        submittedAt:
          type: string
        submittedBy:
          type: string
        status:
          type: string
          enum: [PENDING, PROOF_SUBMITTED, APPROVED, REJECTED, PAID]
        approvalCount:
          type: integer
      required: [id, projectId, projectTitle, title, description, paymentAmount, status, approvalCount]
    ReportConcernRequest:
      type: object
      properties:
        reporterAddress:
          type: string
        reason:
          type: string
        category:
          type: string
          enum: [QUALITY, MISSING_WORK, SAFETY, BUDGET, OTHER]
      required: [reporterAddress, reason, category]
    ProjectReport:
      type: object
      properties:
        id:
          type: string
        projectId:
          type: string
        reporterAddress:
          type: string
        reason:
          type: string
        category:
          type: string
          enum: [QUALITY, MISSING_WORK, SAFETY, BUDGET, OTHER]
        status:
          type: string
          enum: [PENDING_REVIEW, ACKNOWLEDGED, DISMISSED]
        createdAt:
          type: string
      required: [id, projectId, reporterAddress, reason, category, status, createdAt]
    ProofMetadata:
      type: object
      properties:
        milestoneId:
          type: string
        ipfsProofCID:
          type: string
        gatewayUrl:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        submittedAt:
          type: string
        submittedBy:
          type: string
      required: [milestoneId, ipfsProofCID, gatewayUrl, latitude, longitude, submittedAt, submittedBy]
    ProjectStats:
      type: object
      properties:
        totalProjects:
          type: integer
        activeProjects:
          type: integer
        completedProjects:
          type: integer
        totalBudget:
          type: number
        totalSpent:
          type: number
        flaggedProjects:
          type: integer
      required: [totalProjects, activeProjects, completedProjects, totalBudget, totalSpent, flaggedProjects]
    SyncResponse:
      type: object
      properties:
        synced:
          type: boolean
        lastProcessedBlock:
          type: integer
        message:
          type: string
      required: [synced, lastProcessedBlock, message]
    ActivityEvent:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        title:
          type: string
        projectId:
          type: string
        txHash:
          type: string
        timestamp:
          type: string
      required: [id, type, title, projectId, txHash, timestamp]
    AnalyticsOverview:
      type: object
      properties:
        stats:
          $ref: "#/components/schemas/ProjectStats"
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/ActivityEvent"
        budgetByStatus:
          type: array
          items:
            type: object
            properties:
              status:
                type: string
              budget:
                type: number
            required: [status, budget]
      required: [stats, recentActivity, budgetByStatus]
    AnomalyFlag:
      type: object
      properties:
        id:
          type: string
        projectId:
          type: string
        projectTitle:
          type: string
        severity:
          type: string
          enum: [WARNING, CRITICAL]
        reason:
          type: string
        createdAt:
          type: string
      required: [id, projectId, projectTitle, severity, reason, createdAt]
